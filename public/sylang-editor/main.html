<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sylang Editor</title>
  <link rel="stylesheet" href="./main.css?v=20260412b" />
  <style>
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body {
      background: #0e1117;
      color: #e2e8f0;
      font-family: Inter, system-ui, sans-serif;
    }

    /* VSCode CSS variable shims for web iframe context.
       The webview CSS uses --vscode-* vars which are only set inside VSCode.
       Without these, borders are invisible and fonts fall back to browser default. */
    :root {
      --vscode-editor-background: #0e1117;
      --vscode-editor-foreground: #e2e8f0;
      --vscode-panel-border: rgba(255, 255, 255, 0.14);
      --vscode-descriptionForeground: #94a3b8;
      --vscode-input-background: #1a2035;
      --vscode-input-foreground: #e2e8f0;
      --vscode-input-border: rgba(255, 255, 255, 0.12);
      --vscode-textLink-foreground: #5EEAD4;
      --vscode-textLink-activeForeground: #2DD4BF;
      --vscode-focusBorder: #2DD4BF;
      --vscode-editorCursor-foreground: #ffffff;
      --vscode-editor-selectionBackground: rgba(45, 212, 191, 0.2);
      --vscode-font-family: Inter, system-ui, -apple-system, sans-serif;
      --vscode-font-size: 13px;
      --vscode-menu-border: rgba(255, 255, 255, 0.12);
      --vscode-menu-separatorBackground: rgba(255, 255, 255, 0.08);
      --vscode-menu-background: #1a2035;
      --vscode-menu-foreground: #e2e8f0;
      --vscode-sideBar-background: #0e1117;
      --vscode-sideBarSectionHeader-background: rgba(255,255,255,0.04);
      --vscode-badge-background: #2DD4BF;
      --vscode-badge-foreground: #042F2E;
      --vscode-button-background: #2DD4BF;
      --vscode-button-foreground: #042F2E;
      --vscode-button-hoverBackground: #5EEAD4;
      --vscode-statusBar-background: #042F2E;
      --vscode-statusBar-foreground: #99F6E4;
      --vscode-tab-activeBackground: #0e1117;
      --vscode-tab-inactiveBackground: #0a0d13;
      /* Hover widget / tooltip */
      --vscode-editorHoverWidget-background: #1e2a3a;
      --vscode-editorHoverWidget-foreground: #e2e8f0;
      --vscode-editorHoverWidget-border: rgba(255, 255, 255, 0.18);
      --vscode-editorHoverWidget-highlightForeground: #5EEAD4;
      --vscode-errorForeground: #f87171;
    }
    /* Ensure tooltip always renders on top of the iframe content */
    .sylang-symbol-tooltip-anchor { z-index: 99999 !important; }
    .sylang-symbol-tooltip { z-index: 99999 !important; }
  </style>
  <script>
    // Shim: acquireVsCodeApi is not available — vscode-api.ts fallback uses window.parent.postMessage
    // Also forward messages from parent window into the window event system so the
    // existing vscodeBridge.ts listeners pick them up correctly.
    window.addEventListener('message', function(event) {
      // Messages from parent (SylangFileEditor component) are already received via
      // window.addEventListener('message') in SylangEditor.tsx — no extra forwarding needed.
    });
  </script>
</head>
<body class="sylang-theme-dark">
  <div id="root"></div>
  <script type="module" src="./main.js?v=20260412b"></script>
</body>
</html>
